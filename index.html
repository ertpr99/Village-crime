<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Village Game</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #1a2a4a 0%, #0f172a 100%);
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: min(92vw, 420px);
        padding: 28px;
        border-radius: 24px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      }
      .buttons {
        display: grid;
        gap: 12px;
        margin-top: 20px;
      }
      button {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.1);
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Village Game</h1>
      <p>Başlangıç ekranı çalışıyor.</p>
      <div class="buttons">
        <button>Oda Kur</button>
        <button>Oda Listeleri</button>
        <button>Roller Hakkında</button>
        <button>Ayarlar</button>
      </div>
    </div>
  </body>
</html>
